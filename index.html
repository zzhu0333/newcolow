<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>庫洛卡牌・今日運勢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+TC:wght@400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #1a0d1f;
    --bg-deep: #0e0614;
    --gold: #d4a857;
    --gold-light: #f0d287;
    --pink: #f4b8c8;
    --pink-soft: #fce4ec;
    --pink-deep: #c47189;
    --text: #f5e8da;
    --text-dim: #c4a896;
    --magic: #b89dd8;
    --reverse: #b89dd8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: "Noto Serif TC", serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === 背景裝飾 === */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--gold-light);
    border-radius: 50%;
    opacity: 0;
    animation: twinkle 4s ease-in-out infinite;
    box-shadow: 0 0 4px var(--gold-light);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.8; transform: scale(1); }
  }

  /* 魔法陣光圈 */
  body::before {
    content: "";
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1200px; height: 1200px;
    background-image: radial-gradient(circle, transparent 38%, rgba(212, 168, 87, 0.04) 38.5%, transparent 39%);
    border: 1px solid rgba(212, 168, 87, 0.06);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* === Header === */
  .header { text-align: center; margin-bottom: 40px; }
  .header .crest {
    font-family: "Cinzel", serif;
    font-size: 11px;
    letter-spacing: 7px;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
  }
  .header h1 {
    font-family: "Shippori Mincho", serif;
    font-size: clamp(28px, 6vw, 40px);
    background: linear-gradient(135deg, var(--gold-light), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }
  .header .sub { color: var(--text-dim); font-size: 14px; letter-spacing: 3px; }

  /* === 表單區 === */
  .form-card {
    background: rgba(26, 13, 31, 0.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(212, 168, 87, 0.15);
    border-radius: 4px;
    padding: 50px 30px;
    margin: 0 auto 40px;
    max-width: 520px;
    text-align: center;
  }
  .form-card h2 {
    font-family: "Shippori Mincho", serif;
    font-size: 18px;
    color: var(--gold-light);
    margin-bottom: 35px;
    letter-spacing: 5px;
  }
  .date-inputs {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 35px;
    width: 100%;
  }
  .field { flex: 0 0 auto; }
  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-align: center;
  }
  .field input {
    width: 90px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(212, 168, 87, 0.25);
    padding: 14px 0;
    color: var(--text);
    font-family: "Cinzel", serif;
    font-size: 18px;
    text-align: center;
    transition: 0.3s;
    border-radius: 2px;
  }
  @media (max-width: 480px) {
    .field input { width: 80px; font-size: 16px; }
    .date-inputs { gap: 8px; }
  }
  .field input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(0,0,0,0.5);
    box-shadow: 0 0 15px rgba(212, 168, 87, 0.2);
  }

  .submit-btn {
    width: 100%;
    max-width: 320px;
    background: linear-gradient(135deg, var(--gold), var(--pink-deep));
    color: var(--bg-deep);
    border: none;
    padding: 16px;
    font-family: "Shippori Mincho", serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 6px;
    cursor: pointer;
    border-radius: 2px;
    transition: 0.3s;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(212, 168, 87, 0.3); }

  /* === 牌堆區 === */
  .deck-section { display: none; text-align: center; margin-bottom: 40px; }
  .deck-section.show { display: block; }
  .deck-prompt {
    color: var(--gold-light);
    letter-spacing: 3px;
    margin-bottom: 24px;
    font-family: "Shippori Mincho", serif;
    font-size: 15px;
    transition: opacity 0.5s ease;
    min-height: 22px;
  }
  .deck-prompt.fade { opacity: 0.4; }

  /* 牌堆容器：突破 main 的 padding,佔滿視窗寬度,給卡片更多展開空間 */
  .deck-fan {
    position: relative;
    width: 100vw;
    margin-left: calc(50% - 50vw);
    margin-right: calc(50% - 50vw);
    height: clamp(280px, 42vh, 380px);
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1500px;
    padding: 30px 4px 20px;
    /* 不設 overflow:hidden,讓抬起的卡片可以露出來 */
  }

  /* 卡片本體 */
  .deck-card {
    position: absolute;
    width: clamp(72px, 16vw, 120px);
    aspect-ratio: 172 / 384;
    border-radius: 4px;
    overflow: hidden;
    background: #2a1438;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    transform-origin: center bottom;
    transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1),
                box-shadow 0.3s ease,
                opacity 0.5s ease;
    cursor: pointer;
    will-change: transform;
  }
  .deck-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    pointer-events: none;
    display: block;
  }

  /* 階段 1：堆疊狀態 */
  .deck-card.stacked {
    transform: translateX(var(--stack-x, 0px)) translateY(var(--stack-y, 0px));
  }
  .deck-card.stacked.top:hover {
    transform: translateX(var(--stack-x, 0px)) translateY(calc(var(--stack-y, 0px) - 10px)) scale(1.03);
    box-shadow: 0 18px 35px rgba(212, 168, 87, 0.3);
  }

  /* 階段 2：洗牌動畫 */
  .deck-card.shuffling {
    animation: shuffle-shake 2.4s ease-in-out;
  }
  @keyframes shuffle-shake {
    0%, 100% { transform: translate(var(--stack-x, 0px), var(--stack-y, 0px)) rotate(0deg); }
    20% { transform: translate(calc(var(--stack-x, 0px) - 4px), calc(var(--stack-y, 0px) - 8px)) rotate(-2deg); }
    40% { transform: translate(calc(var(--stack-x, 0px) + 4px), calc(var(--stack-y, 0px) - 4px)) rotate(2deg); }
    60% { transform: translate(calc(var(--stack-x, 0px) - 3px), calc(var(--stack-y, 0px) - 6px)) rotate(-1.5deg); }
    80% { transform: translate(calc(var(--stack-x, 0px) + 3px), calc(var(--stack-y, 0px) - 2px)) rotate(1deg); }
  }

  /* 階段 3：水平展開 */
  .deck-card.fanned {
    transform: translateX(var(--fan-x, 0px));
  }
  /* 滑動/hover 抬起 */
  .deck-card.fanned.hover {
    transform: translateX(var(--fan-x, 0px)) translateY(-28px) scale(1.12);
    box-shadow: 0 22px 45px rgba(212, 168, 87, 0.5);
    z-index: 200;
  }
  @media (hover: hover) {
    .deck-card.fanned:hover {
      transform: translateX(var(--fan-x, 0px)) translateY(-28px) scale(1.12);
      box-shadow: 0 22px 45px rgba(212, 168, 87, 0.5);
      z-index: 200;
    }
  }

  /* 階段 4：確認抽選 */
  .deck-card.picked {
    transform: translateX(var(--fan-x, 0px)) translateY(-65px) scale(1.22) !important;
    box-shadow: 0 30px 60px rgba(244, 184, 200, 0.6), 0 0 40px rgba(212, 168, 87, 0.5) !important;
    z-index: 300 !important;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.6s ease;
  }
  .deck-card.fading {
    opacity: 0;
    pointer-events: none;
    transform: translateX(var(--fan-x, 0px)) scale(0.85) !important;
  }

  /* === 結果區 === */
  .result { display: none; text-align: center; animation: fade-in 1s; }
  .result.show { display: block; }
  @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .card-stage { display: flex; justify-content: center; margin: 30px 0; perspective: 1000px; }
  .card-flipper { width: 200px; aspect-ratio: 172/384; transform-style: preserve-3d; transition: 1.2s; }
  .card-flipper.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 6px; overflow: hidden; }
  .card-front { transform: rotateY(180deg); }
  .card-face img { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<main>
  <header class="header">
    <div class="crest">✦ DAILY CLOW READING ✦</div>
    <h1>庫洛卡牌・今日運勢</h1>
    <div class="sub">迎接今日的庫洛訊息</div>
  </header>

  <section class="form-card" id="formCard">
    <h2>請輸入出生年月日</h2>
    <div class="date-inputs">
      <div class="field">
        <label>YEAR</label>
        <input type="number" id="year" placeholder="1999" />
      </div>
      <div class="field">
        <label>MONTH</label>
        <input type="number" id="month" placeholder="04" />
      </div>
      <div class="field">
        <label>DAY</label>
        <input type="number" id="day" placeholder="01" />
      </div>
    </div>
    <button class="submit-btn" id="submitBtn">召 喚 今 日 之 牌</button>
  </section>

  <section class="deck-section" id="deckSection">
    <div class="deck-prompt" id="deckPrompt">點擊牌堆開始洗牌</div>
    <div class="deck-fan" id="deckFan"></div>
  </section>

  <section class="result" id="result">
    <div class="card-stage">
      <div class="card-flipper" id="cardFlipper">
        <div class="card-face card-back"><img src="_img/card_back.jpg" /></div>
        <div class="card-face card-front"><img id="cardImg" /></div>
      </div>
    </div>
    <h3 id="cardName" style="color: var(--pink); letter-spacing: 4px; font-size: 22px;"></h3>
    <button onclick="location.reload()" style="margin-top: 40px; background: none; border: 1px solid var(--text-dim); color: var(--text-dim); padding: 10px 30px; cursor: pointer;">重新查詢</button>
  </section>
</main>

<script>
  // === 初始化星空 ===
  const starsContainer = document.getElementById("stars");
  for (let i = 0; i < 80; i++) {
    const s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.animationDelay = Math.random() * 5 + "s";
    starsContainer.appendChild(s);
  }

  // === 載入卡片資料 ===
  let CARDS = [];
  fetch("cards.json").then(r => r.json()).then(data => { CARDS = data; });

  // === 狀態 ===
  const DECK_SIZE = 52;           // 桌機/手機都展開 52 張
  const STACK_VISIBLE = 6;
  let deckPhase = "stacked";      // stacked / shuffling / fanned / picking
  let isAnimating = false;

  // === 計算扇形展開的 X 位置 ===
  function getFanLayout(count) {
    const fan = document.getElementById("deckFan");
    const containerWidth = fan ? fan.clientWidth : window.innerWidth;
    const cardWidth = Math.max(72, Math.min(120, window.innerWidth * 0.16));
    const sideBuffer = window.innerWidth <= 480 ? 6 : 16;
    const availableWidth = containerWidth - cardWidth - sideBuffer * 2;
    const maxX = availableWidth / 2;

    const layout = [];
    const center = (count - 1) / 2;
    for (let i = 0; i < count; i++) {
      const t = (i - center) / center; // -1 ~ 1
      layout.push({ x: t * maxX });
    }
    return layout;
  }

  // === 建立牌堆 ===
  function buildDeck() {
    const fan = document.getElementById("deckFan");
    fan.innerHTML = "";
    const fanLayout = getFanLayout(DECK_SIZE);

    for (let i = 0; i < DECK_SIZE; i++) {
      const card = document.createElement("div");
      card.className = "deck-card stacked";
      card.dataset.idx = i;
      card.style.zIndex = i;

      // 牌堆狀態：最上面幾張錯位露邊製造厚度
      const isTop = i >= DECK_SIZE - STACK_VISIBLE;
      if (isTop) {
        const off = (i - (DECK_SIZE - STACK_VISIBLE));
        card.style.setProperty("--stack-x", (off * 1.5) + "px");
        card.style.setProperty("--stack-y", (-off * 1.5) + "px");
      } else {
        card.style.setProperty("--stack-x", "0px");
        card.style.setProperty("--stack-y", "0px");
      }

      // 扇形位置
      card.style.setProperty("--fan-x", fanLayout[i].x + "px");

      if (i === DECK_SIZE - 1) card.classList.add("top");

      const img = document.createElement("img");
      img.src = "_img/card_back.jpg";
      img.alt = "牌背";
      card.appendChild(img);

      card.addEventListener("click", () => onCardClick(i, card));

      fan.appendChild(card);
    }

    // === 手指/滑鼠在牌堆上移動,即時抬起最接近的卡片 ===
    // 用 pointermove + elementFromPoint 比 pointerenter 更可靠
    // (滑很快時 enter/leave 會漏掉,加上扇形展開後卡片有重疊也需要 z-index 動態判斷)
    fan.addEventListener("pointermove", (e) => {
      if (deckPhase !== "fanned") return;
      onPointerMove(e);
    });
    fan.addEventListener("pointerleave", () => {
      fan.querySelectorAll(".deck-card.hover").forEach(c => c.classList.remove("hover"));
    });

    // touch 環境下,touchmove 時也觸發
    fan.addEventListener("touchmove", (e) => {
      if (deckPhase !== "fanned") return;
      if (e.touches && e.touches[0]) {
        onPointerMove(e.touches[0]);
      }
    }, { passive: true });
  }

  // 根據指標 X 位置,從所有 fanned 卡片中找出最接近的那張並抬起
  // (用幾何距離比 elementFromPoint 更穩定,因為卡片有重疊)
  function onPointerMove(point) {
    const fan = document.getElementById("deckFan");
    const cards = fan.querySelectorAll(".deck-card.fanned");
    if (cards.length === 0) return;

    let nearestCard = null;
    let nearestDist = Infinity;

    cards.forEach(c => {
      const rect = c.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      // 主要看 X 距離(因為卡片橫向排列),但 Y 太遠也不算
      const dx = Math.abs(point.clientX - cx);
      const dy = Math.abs(point.clientY - cy);
      // Y 距離超過卡片高度就忽略(指標離牌列太遠)
      if (dy > rect.height * 0.8) return;
      if (dx < nearestDist) {
        nearestDist = dx;
        nearestCard = c;
      }
    });

    // 設定 hover 狀態
    cards.forEach(c => {
      if (c === nearestCard) {
        if (!c.classList.contains("hover")) c.classList.add("hover");
      } else {
        if (c.classList.contains("hover")) c.classList.remove("hover");
      }
    });
  }

  // === 點擊卡片 ===
  function onCardClick(idx, cardEl) {
    if (isAnimating) return;
    if (deckPhase === "stacked") {
      if (!cardEl.classList.contains("top")) return;
      startShuffle();
    } else if (deckPhase === "fanned") {
      pickCard(cardEl);
    }
  }

  // === 階段 2:洗牌 ===
  function startShuffle() {
    isAnimating = true;
    deckPhase = "shuffling";
    document.getElementById("deckPrompt").textContent = "✦ 正在傾聽你的提問 ✦";

    const cards = document.querySelectorAll(".deck-card");
    cards.forEach((c, i) => {
      c.classList.remove("top");
      c.style.animationDelay = (i * 0.02) + "s";
      c.classList.add("shuffling");
    });

    setTimeout(() => {
      cards.forEach(c => {
        c.classList.remove("shuffling");
        c.style.animationDelay = "";
      });
      fanOpen();
    }, 2500);
  }

  // === 階段 3:水平展開 ===
  function fanOpen() {
    deckPhase = "fanned";
    document.getElementById("deckPrompt").textContent = "✦ 滑動選擇你的卡牌 · 點擊確認抽選 ✦";

    const cards = document.querySelectorAll(".deck-card");
    cards.forEach((card, i) => {
      setTimeout(() => {
        card.classList.remove("stacked");
        card.classList.add("fanned");
      }, i * 20);
    });

    setTimeout(() => {
      isAnimating = false;
    }, cards.length * 20 + 500);
  }

  // === 階段 4:確認抽選 ===
  function pickCard(cardEl) {
    isAnimating = true;
    deckPhase = "picking";
    document.getElementById("deckPrompt").textContent = "✦ 你的訊息正在揭曉 ✦";

    cardEl.classList.remove("hover");
    cardEl.classList.add("picked");

    // 其他卡淡出
    document.querySelectorAll(".deck-card").forEach(c => {
      if (c !== cardEl) c.classList.add("fading");
    });

    setTimeout(() => {
      document.getElementById("deckSection").style.display = "none";
      const card = CARDS[Math.floor(Math.random() * CARDS.length)];
      document.getElementById("cardImg").src = card.image_clow;
      document.getElementById("cardName").textContent = "「" + card.name_zh + "」牌";
      document.getElementById("result").classList.add("show");
      setTimeout(() => document.getElementById("cardFlipper").classList.add("flipped"), 500);
    }, 1100);
  }

  // === 啟動 ===
  document.getElementById("submitBtn").addEventListener("click", () => {
    document.getElementById("formCard").style.display = "none";
    document.getElementById("deckSection").classList.add("show");
    deckPhase = "stacked";
    isAnimating = false;
    document.getElementById("deckPrompt").textContent = "點擊牌堆開始洗牌";
    buildDeck();
  });

  window.addEventListener("resize", () => {
    if (deckPhase === "stacked" &&
        document.getElementById("deckSection").classList.contains("show") &&
        !isAnimating) {
      buildDeck();
    }
  });
</script>
</body>
</html>
