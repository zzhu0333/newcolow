<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>庫洛卡牌・今日運勢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+TC:wght@400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #1a0d1f;
    --bg-deep: #0e0614;
    --gold: #d4a857;
    --gold-light: #f0d287;
    --pink: #f4b8c8;
    --pink-soft: #fce4ec;
    --pink-deep: #c47189;
    --text: #f5e8da;
    --text-dim: #c4a896;
    --magic: #b89dd8;
    --reverse: #b89dd8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: "Noto Serif TC", serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 星塵背景 */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .star {
    position: absolute; background: var(--gold-light); border-radius: 50%; opacity: 0;
    animation: twinkle var(--duration) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--max-opacity); transform: scale(1); }
  }

  main { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 60px 24px; }

  /* Header */
  .header { text-align: center; margin-bottom: 50px; }
  .crest { font-family: "Cinzel", serif; font-size: 11px; letter-spacing: 6px; color: var(--gold); margin-bottom: 20px; }
  .header h1 {
    font-family: "Shippori Mincho", serif; font-size: clamp(28px, 6vw, 40px);
    background: linear-gradient(135deg, var(--gold-light), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 5px; margin-bottom: 10px;
  }
  .header .sub { color: var(--text-dim); font-size: 14px; letter-spacing: 3px; }

  /* 表單 */
  .form-card {
    background: rgba(26, 13, 31, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(212, 168, 87, 0.15);
    padding: 60px 40px; margin: 0 auto; max-width: 520px; text-align: center;
  }
  .form-card h2 { font-size: 18px; color: var(--gold-light); margin-bottom: 40px; letter-spacing: 6px; }
  .date-inputs { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
  .field { display: flex; flex-direction: column; align-items: center; width: 100px; }
  .field label { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 12px; font-family: "Cinzel", serif; }
  .field input {
    width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(212, 168, 87, 0.2);
    padding: 15px 0; color: var(--text); font-family: "Cinzel", serif; font-size: 22px;
    text-align: center; border-radius: 0; outline: none;
  }

  .submit-btn {
    width: 100%; max-width: 300px; background: linear-gradient(135deg, var(--gold), var(--pink-deep));
    color: var(--bg-deep); border: none; padding: 16px; font-size: 15px; letter-spacing: 6px; cursor: pointer;
    font-weight: bold;
  }

  /* 牌堆展示區 - 洗牌卡片放大 1.5 倍 */
  .deck-section { display: none; text-align: center; }
  .deck-section.show { display: block; }
  .deck-prompt { font-size: 14px; color: var(--pink); letter-spacing: 4px; margin-bottom: 30px; transition: 0.5s; }
  
  .deck-fan {
    position: relative; width: 100%; height: 500px; margin: 20px auto;
    display: flex; justify-content: center; align-items: center;
  }
  .deck-card {
    position: absolute; 
    width: clamp(70px, 12vw, 112px); /* 調整後放大 1.5 倍尺寸 */
    aspect-ratio: 172 / 384;
    border-radius: 6px; overflow: hidden; background: #2a1438;
    box-shadow: -2px 0 12px rgba(0,0,0,0.5);
    transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s; cursor: pointer;
    transform: translateX(0); /* 初始堆疊 */
  }
  .deck-card img { width: 100%; height: 100%; object-fit: cover; }
  
  /* 洗牌抖動動畫 */
  .deck-card.shuffling { animation: shuffle-shake 1.8s ease-in-out infinite; }
  @keyframes shuffle-shake { 
    0%, 100% { transform: translate(0, 0); } 
    25% { transform: translate(-10px, 4px); } 
    75% { transform: translate(10px, -4px); } 
  }
  
  /* 展開狀態 - 使用 JS 計算的 --fan-x */
  .deck-card.fanned { transform: translateX(var(--fan-x)); }
  .deck-card.fanned:hover { transform: translateX(var(--fan-x)) translateY(-40px); z-index: 1000 !important; }
  .deck-card.fading { opacity: 0; pointer-events: none; }

  /* 結果展示區 - 卡片維持原大小 (220px) */
  .result { display: none; margin-top: 40px; text-align: center; }
  .result.show { display: block; animation: fade-in 1s forwards; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  .card-stage { display: flex; justify-content: center; margin-bottom: 50px; perspective: 1500px; }
  .card-flipper { 
    width: 220px; 
    aspect-ratio: 172/384; 
    position: relative; transform-style: preserve-3d; transition: 1.6s cubic-bezier(0.4, 0, 0.2, 1); 
  }
  .card-flipper.flipped { transform: rotateY(180deg); }
  .card-flipper.flipped.reversed { transform: rotateY(180deg) rotateZ(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 8px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
  .card-back { background: #2a1438; }
  .card-front { transform: rotateY(180deg); }
  .card-face img { width: 100%; height: 100%; object-fit: cover; }

  .card-info { opacity: 0; transform: translateY(20px); transition: 0.8s ease; max-width: 600px; margin: 0 auto; padding: 20px; }
  .card-info.show { opacity: 1; transform: translateY(0); }
  
  .orientation-tag { display: inline-block; padding: 4px 12px; font-size: 12px; letter-spacing: 2px; margin-bottom: 20px; border: 1px solid; }
  .orientation-tag.upright { color: var(--gold); border-color: var(--gold); }
  .orientation-tag.reversed { color: var(--reverse); border-color: var(--reverse); }
  
  .card-name-zh { font-size: 32px; color: var(--gold-light); letter-spacing: 8px; margin-bottom: 12px; font-family: "Shippori Mincho"; }
  .card-symbol { font-size: 14px; color: var(--pink); letter-spacing: 3px; margin-bottom: 35px; font-family: "Shippori Mincho"; }
  .card-message { line-height: 2; color: var(--text); text-align: justify; margin-bottom: 50px; font-size: 16px; border-top: 1px solid rgba(212,168,87,0.2); padding-top: 30px; }

  .reroll-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 12px 40px; cursor: pointer; transition: 0.3s; font-family: "Shippori Mincho"; letter-spacing: 2px; }
  .reroll-btn:hover { background: var(--gold); color: var(--bg-deep); }

  @media (max-width: 600px) { 
    .card-flipper { width: 180px; } 
    .deck-fan { height: 400px; }
    .deck-card { width: 65px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<main>
  <header class="header">
    <div class="crest">✦ DAILY CLOW READING ✦</div>
    <h1>庫洛卡牌・今日運勢</h1>
    <div class="sub">迎接今日的庫洛訊息</div>
  </header>

  <section class="form-card" id="formCard">
    <h2>請輸入出生年月日</h2>
    <div class="date-inputs">
      <div class="field"><label>YEAR</label><input type="number" id="year" placeholder="1999" /></div>
      <div class="field"><label>MONTH</label><input type="number" id="month" placeholder="04" /></div>
      <div class="field"><label>DAY</label><input type="number" id="day" placeholder="01" /></div>
    </div>
    <button class="submit-btn" id="submitBtn">召 喚 今 日 之 牌</button>
  </section>

  <section class="deck-section" id="deckSection">
    <div class="deck-prompt" id="deckPrompt">點擊牌堆進行洗牌</div>
    <div class="deck-fan" id="deckFan"></div>
  </section>

  <section class="result" id="result">
    <div class="card-stage">
      <div class="card-flipper" id="cardFlipper">
        <div class="card-face card-back"><img src="_img/card_back.jpg" /></div>
        <div class="card-face card-front"><img id="cardImg" /></div>
      </div>
    </div>
    <div class="card-info" id="cardInfo">
      <div id="orientationTag" class="orientation-tag"></div>
      <h3 id="cardNameZh" class="card-name-zh"></h3>
      <div id="cardSymbol" class="card-symbol"></div>
      <p id="cardMessage" class="card-message"></p>
      <button id="rerollBtn" class="reroll-btn">重新召喚</button>
    </div>
  </section>
</main>

<script>
  let CARDS = [];
  let pendingResult = null;
  let deckPhase = "stacked";
  let isAnimating = false;
  const DECK_COUNT = 52;

  // 載入卡牌資料
  fetch("cards.json").then(r => r.json()).then(data => { CARDS = data; });

  // 1. 提交表單：預抽卡並顯示牌堆
  document.getElementById("submitBtn").addEventListener("click", () => {
    const y = document.getElementById("year").value;
    const m = document.getElementById("month").value;
    const d = document.getElementById("day").value;
    if(!y || !m || !d) return;

    // 隨機選定結果（包含正逆位）
    const card = CARDS[Math.floor(Math.random() * CARDS.length)];
    const orientation = Math.random() > 0.7 ? 1 : 0; 
    pendingResult = { card, orientation };

    document.getElementById("formCard").style.display = "none";
    document.getElementById("deckSection").classList.add("show");
    deckPhase = "stacked";
    buildDeck();
  });

  // 2. 建立水平展開牌堆 (修改後的動畫呈現)
  function buildDeck() {
    const fan = document.getElementById("deckFan");
    fan.innerHTML = "";
    const fanWidth = fan.clientWidth;
    const cardWidth = Math.max(70, Math.min(112, window.innerWidth * 0.12));
    const totalTravel = fanWidth * 0.92; 
    const step = (totalTravel - cardWidth) / (DECK_COUNT - 1);

    for (let i = 0; i < DECK_COUNT; i++) {
      const card = document.createElement("div");
      card.className = "deck-card";
      card.style.zIndex = i;
      // 計算位置並存入 CSS 變數
      const x = (i * step) - (totalTravel / 2) + (cardWidth / 2);
      card.style.setProperty("--fan-x", x + "px");

      const img = document.createElement("img");
      img.src = "_img/card_back.jpg";
      card.appendChild(img);
      
      card.addEventListener("click", () => {
        if (isAnimating) return;
        if (deckPhase === "stacked") startShuffle();
        else if (deckPhase === "fanned") pickCard(card);
      });
      fan.appendChild(card);
    }
  }

  // 3. 洗牌動作
  function startShuffle() {
    isAnimating = true;
    const cards = document.querySelectorAll(".deck-card");
    cards.forEach(c => c.classList.add("shuffling"));
    
    setTimeout(() => {
      cards.forEach(c => {
        c.classList.remove("shuffling");
        c.classList.add("fanned"); // 展開到計算好的位置
      });
      deckPhase = "fanned";
      isAnimating = false;
      const prompt = document.getElementById("deckPrompt");
      if(prompt) prompt.textContent = "請選中一張牌揭曉今日命運";
    }, 1800);
  }

  // 4. 抽牌動作：選中後飛出並淡出其餘卡片
  function pickCard(cardEl) {
    isAnimating = true;
    cardEl.style.zIndex = "2000";
    // 抽牌動畫：向上飛出並放大
    cardEl.style.transform = "translateX(var(--fan-x)) translateY(-120px) scale(1.2)";
    
    document.querySelectorAll(".deck-card").forEach(c => { 
        if(c !== cardEl) c.classList.add("fading"); 
    });

    setTimeout(() => {
      document.getElementById("deckSection").classList.remove("show");
      revealResult(pendingResult);
      isAnimating = false;
    }, 800);
  }

  // 5. 揭曉結果：保留 3D 翻面與資訊展示
  function revealResult({ card, orientation }) {
    const isReversed = orientation === 1;
    document.getElementById("cardImg").src = card.image_clow;
    document.getElementById("cardNameZh").textContent = "「" + card.name_zh + "」牌";
    document.getElementById("cardSymbol").textContent = card.symbol;
    document.getElementById("cardMessage").textContent = isReversed ? (card.message_reversed || card.message) : card.message;
    
    const tag = document.getElementById("orientationTag");
    tag.textContent = isReversed ? "REVERSED · 逆位" : "UPRIGHT · 正位";
    tag.className = "orientation-tag " + (isReversed ? "reversed" : "upright");

    document.getElementById("result").classList.add("show");
    
    // 觸發翻牌動畫
    setTimeout(() => {
      const flipper = document.getElementById("cardFlipper");
      flipper.classList.add("flipped");
      if (isReversed) flipper.classList.add("reversed");
      
      // 資訊區淡入
      setTimeout(() => {
          document.getElementById("cardInfo").classList.add("show");
      }, 1200);
    }, 600);
  }

  // 6. 重新召喚：重置頁面
  document.getElementById("rerollBtn").addEventListener("click", () => {
    location.reload();
  });

  // 星塵背景生成
  const container = document.getElementById("stars");
  for (let i = 0; i < 80; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random()*2+1;
    s.style.width = size+"px"; s.style.height = size+"px";
    s.style.left = Math.random()*100+"%"; s.style.top = Math.random()*100+"%";
    s.style.setProperty("--duration", (Math.random()*3+2)+"s");
    s.style.setProperty("--max-opacity", Math.random()*0.7+0.2);
    container.appendChild(s);
  }
</script>
</body>
</html>
