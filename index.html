<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>庫洛牌・今日運勢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+TC:wght@400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #1a0d1f;
    --bg-deep: #0e0614;
    --gold: #d4a857;
    --gold-light: #f0d287;
    --pink: #f4b8c8;
    --pink-soft: #fce4ec;
    --pink-deep: #c47189;
    --text: #f5e8da;
    --text-dim: #c4a896;
    --magic: #b89dd8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: "Noto Serif TC", serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 旋轉魔法陣 */
  body::before {
    content: "";
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1200px; height: 1200px;
    background-image: radial-gradient(circle, transparent 38%, rgba(212, 168, 87, 0.04) 38.5%, transparent 39%),
                      radial-gradient(circle, transparent 48%, rgba(212, 168, 87, 0.06) 48.5%, transparent 49%);
    border: 1px solid rgba(212, 168, 87, 0.08);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: rotate 120s linear infinite;
  }
  @keyframes rotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* 星塵 */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--gold-light);
    border-radius: 50%;
    opacity: 0;
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.8; transform: scale(1); }
  }

  main {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* 標題 */
  .header {
    text-align: center;
    margin-bottom: 50px;
    animation: fade-in 1.2s ease-out;
  }
  .header .crest {
    font-family: "Cinzel", serif;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--gold);
    margin-bottom: 16px;
  }
  .header h1 {
    font-family: "Shippori Mincho", "Noto Serif TC", serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold-light), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.4;
    margin-bottom: 12px;
  }
  .header .sub {
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 2px;
  }
  .header .today-date {
    color: var(--gold-light);
    font-size: 13px;
    letter-spacing: 4px;
    margin-top: 14px;
    font-family: "Cinzel", serif;
  }
  .header .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 24px auto 0;
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 表單卡 */
  .form-card {
    background: rgba(26, 13, 31, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(212, 168, 87, 0.2);
    border-radius: 4px;
    padding: 40px 32px;
    margin-bottom: 40px;
    position: relative;
    animation: fade-in 1.4s ease-out;
  }
  .form-card::before, .form-card::after {
    content: "✦";
    position: absolute;
    color: var(--gold);
    font-size: 12px;
  }
  .form-card::before { top: 12px; left: 14px; }
  .form-card::after { bottom: 12px; right: 14px; }

  .form-card h2 {
    font-family: "Shippori Mincho", serif;
    font-size: 18px;
    text-align: center;
    color: var(--gold-light);
    margin-bottom: 8px;
    letter-spacing: 4px;
  }
  .form-card .hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 28px;
  }

  .date-inputs {
    display: grid;
    grid-template-columns: 1.3fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }

  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-align: center;
  }

  .field input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(212, 168, 87, 0.3);
    border-radius: 2px;
    padding: 14px 8px;
    color: var(--text);
    font-family: "Cinzel", "Noto Serif TC", serif;
    font-size: 20px;
    text-align: center;
    transition: all 0.3s;
  }
  .field input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(0,0,0,0.5);
    box-shadow: 0 0 20px rgba(212, 168, 87, 0.2);
  }

  .submit-btn {
    display: block;
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
    background: linear-gradient(135deg, var(--gold), var(--pink-deep));
    color: var(--bg-deep);
    border: none;
    padding: 16px;
    font-family: "Shippori Mincho", serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 6px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.3s;
  }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(212, 168, 87, 0.3);
  }

  .error {
    color: var(--pink);
    font-size: 13px;
    text-align: center;
    margin-top: 12px;
    min-height: 18px;
  }

  /* 結果區 */
  .result {
    display: none;
    animation: result-in 1.5s ease-out;
  }
  .result.show { display: block; }

  @keyframes result-in {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* 翻牌前的引導文字 */
  .reveal-banner {
    text-align: center;
    margin-bottom: 32px;
  }
  .reveal-banner .reveal-line {
    font-family: "Shippori Mincho", serif;
    font-size: 15px;
    color: var(--gold-light);
    letter-spacing: 8px;
    padding-bottom: 16px;
    position: relative;
    display: inline-block;
  }
  .reveal-banner .reveal-line::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* 牌背 → 翻牌動畫 */
  .card-stage {
    perspective: 1500px;
    display: flex;
    justify-content: center;
    margin-bottom: 32px;
  }
  .card-flipper {
    position: relative;
    width: 200px;
    aspect-ratio: 172 / 384;
    transform-style: preserve-3d;
    transition: transform 1.4s cubic-bezier(0.5, -0.3, 0.3, 1.3);
    cursor: default;
  }
  .card-flipper.flipped {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .card-back {
    background: linear-gradient(135deg, #2a1438 0%, #1a0d1f 50%, #2a1438 100%);
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .card-back::before {
    content: "";
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(212, 168, 87, 0.4);
    border-radius: 4px;
  }
  .card-back-symbol {
    font-family: "Cinzel", serif;
    color: var(--gold);
    font-size: 38px;
    text-align: center;
    line-height: 1.5;
    text-shadow: 0 0 20px rgba(212, 168, 87, 0.6);
    position: relative;
    z-index: 1;
  }
  .card-back-symbol small {
    display: block;
    font-size: 10px;
    letter-spacing: 4px;
    margin-top: 8px;
    color: var(--gold-light);
  }
  .card-front {
    transform: rotateY(180deg);
    background: #fce4ec;
  }
  .card-front img {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
  }

  /* 牌面資訊 */
  .card-info {
    background: linear-gradient(135deg, rgba(196, 113, 137, 0.08), rgba(212, 168, 87, 0.05));
    border: 1px solid rgba(212, 168, 87, 0.25);
    padding: 36px;
    border-radius: 6px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease 1.2s, transform 0.8s ease 1.2s;
  }
  .card-flipper.flipped + .card-info,
  .card-info.show {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 680px) {
    .card-info { padding: 24px; }
  }

  .card-info .card-number {
    font-family: "Cinzel", serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 8px;
  }
  .card-info .card-name-en {
    font-family: "Cinzel", serif;
    font-size: 26px;
    letter-spacing: 4px;
    color: var(--gold-light);
    text-align: center;
    margin-bottom: 6px;
  }
  .card-info .card-name-zh {
    font-family: "Shippori Mincho", serif;
    font-size: 22px;
    color: var(--pink);
    text-align: center;
    margin-bottom: 28px;
    letter-spacing: 4px;
  }

  .ornament {
    text-align: center;
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 8px;
    margin-bottom: 24px;
    opacity: 0.6;
  }

  .field-block {
    margin-bottom: 22px;
  }
  .field-block:last-child { margin-bottom: 0; }

  .field-block .label {
    font-family: "Cinzel", serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .field-block .label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), transparent);
    opacity: 0.4;
  }
  .field-block .content {
    font-size: 15px;
    line-height: 1.9;
    color: var(--text);
  }

  .footer-actions {
    margin-top: 30px;
    text-align: center;
  }
  .reroll-btn {
    background: transparent;
    border: 1px solid var(--text-dim);
    color: var(--text-dim);
    padding: 10px 28px;
    font-family: "Noto Serif TC", serif;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.3s;
  }
  .reroll-btn:hover {
    border-color: var(--gold);
    color: var(--gold-light);
  }

  footer {
    text-align: center;
    margin-top: 60px;
    padding-top: 40px;
    border-top: 1px solid rgba(212, 168, 87, 0.1);
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 2px;
  }
</style>

<div class="stars" id="stars"></div>

      </div>
      <div class="field">
        <label>MONTH</label>
        <input type="number" id="month" placeholder="04" min="1" max="12" inputmode="numeric" />
      </div>
      <div class="field">
        <label>DAY</label>
        <input type="number" id="day" placeholder="01" min="1" max="31" inputmode="numeric" />
      </div>
    </div>
    <button class="submit-btn" id="submitBtn">召 喚 今 日 之 牌</button>
    <div class="error" id="errorMsg"></div>
  </section>

  <!-- 結果 -->
  <section class="result" id="result">
    <div class="reveal-banner">
      <div class="reveal-line">✦　今 日 宇 宙 為 你 揭 示　✦</div>

  function getZodiac(month, day) {
    for (const z of ZODIACS) {
      const [sM, sD] = z.start;
      const [eM, eD] = z.end;
      // 跨年（摩羯座）特殊處理
      if (sM > eM) {
        if ((month === sM && day >= sD) || (month === eM && day <= eD)) return z;
      } else {
        if ((month === sM && day >= sD) || (month === eM && day <= eD)) return z;
      }
    }

    let h = 2166136261;
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function pickTodayCard(year, month, day, totalCards) {
    const birthKey = year + "-" +
                     String(month).padStart(2, "0") + "-" +
                     String(day).padStart(2, "0");
    const dateKey = now.getFullYear() + "-" +
                    String(now.getMonth() + 1).padStart(2, "0") + "-" +
                    String(now.getDate()).padStart(2, "0");
    // 個人生日 + 今天日期 → 同一個人一天內固定一張，過了 0 點換新
    const seed = hashString(birthKey + "::" + dateKey);
    return (seed % totalCards) + 1;
  }

  // ========== 驗證日期 ==========
  function isValidDate(y, m, d) {
    if (y < 1900 || y > 2100) return false;
    if (m < 1 || m > 12) return false;
    if (d < 1 || d > 31) return false;
    const dt = new Date(y, m - 1, d);
    return dt.getFullYear() === y && dt.getMonth() === m - 1 && dt.getDate() === d;
  }

  // ========== 主流程 ==========
  let CARDS = [];

  try {
    const _data = JSON.parse(document.getElementById("cards-data").textContent);
    CARDS = _data.filter(c => c.number <= 52);
  } catch (err) {
    document.getElementById("errorMsg").textContent = "卡片資料載入失敗";
  }

  document.getElementById("submitBtn").addEventListener("click", divine);

  document.querySelectorAll(".field input").forEach(inp => {
    inp.addEventListener("keydown", e => {
      if (e.key === "Enter") divine();
    });
  });

  function divine() {
    const y = parseInt(document.getElementById("year").value, 10);
    const m = parseInt(document.getElementById("month").value, 10);
    const d = parseInt(document.getElementById("day").value, 10);
    const err = document.getElementById("errorMsg");

    if (!y || !m || !d) {
      err.textContent = "請完整輸入年、月、日";
      return;
    }
    if (!isValidDate(y, m, d)) {
      err.textContent = "這個日期不存在，請重新確認";
      return;
    }
    if (CARDS.length === 0) {
      err.textContent = "卡片資料尚未載入";
      return;
    }
    err.textContent = "";

    const cardNum = pickTodayCard(y, m, d, CARDS.length);
    const card = CARDS.find(c => c.number === cardNum);
    if (!card) {
      err.textContent = "找不到對應卡片";
      return;
    }

    showResult(card);
  }

  function showResult(card) {
    // 預先載入卡片
    document.getElementById("cardImg").src = card.image_clow;
    document.getElementById("cardImg").alt = card.name_zh + "牌";

    // 填牌面資訊（先填好，等翻牌動畫完顯示）
    document.getElementById("cardNumber").textContent =
      "NO. " + String(card.number).padStart(2, "0");
    document.getElementById("cardNameEn").textContent = card.name_en;
    document.getElementById("cardNameZh").textContent = "「" + card.name_zh + "」牌";
    document.getElementById("cardSymbol").textContent = card.symbol;
    document.getElementById("cardMessage").textContent = card.message;
    document.getElementById("cardCaution").textContent = card.caution;

    // 重置翻牌狀態
    const flipper = document.getElementById("cardFlipper");
    flipper.classList.remove("flipped");
    document.getElementById("cardInfo").classList.remove("show");

    // 顯示結果區
    const result = document.getElementById("result");
    result.classList.add("show");

    // 滾動到結果
    setTimeout(() => {
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 100);

    // 延遲翻牌（讓使用者先看到牌背，營造期待感）
    setTimeout(() => {
      flipper.classList.add("flipped");
    }, 1200);

    // 翻牌後再顯示牌面資訊
    setTimeout(() => {
      document.getElementById("cardInfo").classList.add("show");
    }, 2400);
  }

  document.getElementById("rerollBtn").addEventListener("click", () => {
    document.getElementById("result").classList.remove("show");
    document.getElementById("year").value = "";
    document.getElementById("month").value = "";
    document.getElementById("day").value = "";
    document.getElementById("year").focus();
    document.getElementById("formCard").scrollIntoView({ behavior: "smooth", block: "start" });
  });
</script>
