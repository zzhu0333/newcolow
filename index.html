<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>庫洛卡牌・今日運勢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+TC:wght@400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0e0614;
    --gold: #d4a857;
    --gold-light: #f0d287;
    --pink: #f4b8c8;
    --pink-deep: #c47189;
    --text: #f5e8da;
    --text-dim: #c4a896;
    --reverse: #b89dd8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: "Noto Serif TC", serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 星塵背景 */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .star {
    position: absolute; background: var(--gold-light); border-radius: 50%; opacity: 0;
    animation: twinkle var(--duration) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--max-opacity); transform: scale(1); }
  }

  main { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 40px 24px; }

  /* Header */
  .header { text-align: center; margin-bottom: 40px; }
  .crest { font-family: "Cinzel", serif; font-size: 11px; letter-spacing: 6px; color: var(--gold); margin-bottom: 15px; }
  .header h1 {
    font-family: "Shippori Mincho", serif; font-size: clamp(24px, 5vw, 36px);
    background: linear-gradient(135deg, var(--gold-light), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 5px;
  }

  /* 1. 表單區 */
  .form-card {
    background: rgba(26, 13, 31, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(212, 168, 87, 0.15);
    padding: 40px; margin: 0 auto; max-width: 500px; text-align: center;
  }
  .date-inputs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
  .field { display: flex; flex-direction: column; width: 80px; }
  .field label { font-size: 10px; color: var(--text-dim); margin-bottom: 8px; font-family: "Cinzel"; }
  .field input {
    background: rgba(0,0,0,0.3); border: 1px solid rgba(212, 168, 87, 0.2);
    padding: 10px; color: var(--text); text-align: center; font-size: 18px; outline: none;
  }
  .submit-btn {
    width: 100%; max-width: 260px; background: linear-gradient(135deg, var(--gold), var(--pink-deep));
    color: var(--bg-deep); border: none; padding: 14px; font-weight: bold; letter-spacing: 4px; cursor: pointer;
  }

  /* 2. 牌堆動畫區 */
  .deck-section { display: none; text-align: center; width: 100%; opacity: 1; transition: opacity 0.5s; }
  .deck-section.show { display: block; }
  .deck-prompt { font-size: 14px; color: var(--pink); letter-spacing: 2px; margin-bottom: 20px; height: 20px; }
  
  .deck-fan {
    position: relative; width: 100%; height: 500px; 
    display: flex; justify-content: center; align-items: center;
    perspective: 1000px;
  }
  .deck-card {
    position: absolute; 
    width: clamp(80px, 15vw, 110px); /* 放大 1.5 倍的視覺感 */
    aspect-ratio: 172 / 384;
    border-radius: 6px; overflow: hidden;
    box-shadow: -2px 0 10px rgba(0,0,0,0.5);
    background: #2a1438;
    cursor: pointer;
    /* 關鍵：初始 transform 必須明確 */
    transform: translateX(0) translateY(0) scale(1);
    transition: transform 0.7s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.4s;
  }
  .deck-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  
  /* 洗牌抖動 */
  .deck-card.shuffling { animation: shuffle-shake 0.8s ease-in-out infinite; }
  @keyframes shuffle-shake { 
    0%, 100% { transform: translate(0, 0); } 
    25% { transform: translate(-10px, 5px); } 
    75% { transform: translate(10px, -5px); } 
  }
  
  /* 展開狀態 */
  .deck-card.fanned { transform: translateX(var(--fan-x)); }
  .deck-card.fanned:hover { transform: translateX(var(--fan-x)) translateY(-30px); z-index: 1000 !important; }
  
  /* 選中與淡出 */
  .deck-card.picking { z-index: 2000 !important; }
  .deck-card.fading { opacity: 0; pointer-events: none; }

  /* 3. 結果區 */
  .result { display: none; text-align: center; padding-bottom: 80px; }
  .result.show { display: block; }
  .card-stage { display: flex; justify-content: center; margin: 40px 0; perspective: 1500px; }
  .card-flipper { 
    width: 220px; /* 結果卡片維持原大小 */
    aspect-ratio: 172/384; 
    position: relative; transform-style: preserve-3d; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); 
  }
  .card-flipper.flipped { transform: rotateY(180deg); }
  .card-flipper.flipped.reversed { transform: rotateY(180deg) rotateZ(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
  .card-back { background: #2a1438; }
  .card-front { transform: rotateY(180deg); }
  .card-face img { width: 100%; height: 100%; object-fit: cover; }

  .card-info { opacity: 0; transform: translateY(20px); transition: 0.8s ease 0.5s; max-width: 600px; margin: 0 auto; padding: 20px; }
  .card-info.show { opacity: 1; transform: translateY(0); }
  .orientation-tag { display: inline-block; padding: 4px 12px; font-size: 12px; margin-bottom: 15px; border: 1px solid; }
  .orientation-tag.upright { color: var(--gold); border-color: var(--gold); }
  .orientation-tag.reversed { color: var(--reverse); border-color: var(--reverse); }
  .card-name-zh { font-size: 32px; color: var(--gold-light); margin-bottom: 10px; font-family: "Shippori Mincho"; letter-spacing: 4px; }
  .card-message { line-height: 1.8; text-align: justify; border-top: 1px solid rgba(212,168,87,0.2); padding-top: 20px; }
  .reroll-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px 30px; cursor: pointer; margin-top: 40px; font-family: "Shippori Mincho"; }

  @media (max-width: 600px) { .card-flipper { width: 180px; } .deck-fan { height: 400px; } }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<main>
  <header class="header">
    <div class="crest">✦ DAILY CLOW READING ✦</div>
    <h1>庫洛卡牌・今日運勢</h1>
  </header>

  <section class="form-card" id="formCard">
    <div class="date-inputs">
      <div class="field"><label>YEAR</label><input type="number" id="year" placeholder="1999" /></div>
      <div class="field"><label>MONTH</label><input type="number" id="month" placeholder="04" /></div>
      <div class="field"><label>DAY</label><input type="number" id="day" placeholder="01" /></div>
    </div>
    <button class="submit-btn" id="submitBtn">召 喚 今 日 之 牌</button>
  </section>

  <section class="deck-section" id="deckSection">
    <div class="deck-prompt" id="deckPrompt">點擊牌堆進行洗牌</div>
    <div class="deck-fan" id="deckFan"></div>
  </section>

  <section class="result" id="result">
    <div class="card-stage">
      <div class="card-flipper" id="cardFlipper">
        <div class="card-face card-back"><img src="_img/card_back.jpg" /></div>
        <div class="card-face card-front"><img id="cardImg" /></div>
      </div>
    </div>
    <div class="card-info" id="cardInfo">
      <div id="orientationTag" class="orientation-tag"></div>
      <h3 id="cardNameZh" class="card-name-zh"></h3>
      <p id="cardMessage" class="card-message"></p>
      <button id="rerollBtn" class="reroll-btn">重新召喚</button>
    </div>
  </section>
</main>

<script>
  let CARDS = [];
  let pendingResult = null;
  let deckPhase = "stacked";
  let isAnimating = false;
  const DECK_COUNT = 52;

  fetch("cards.json").then(r => r.json()).then(data => { CARDS = data; });

  // 1. 啟動流程
  document.getElementById("submitBtn").addEventListener("click", () => {
    const y = document.getElementById("year").value, m = document.getElementById("month").value, d = document.getElementById("day").value;
    if(!y || !m || !d) return alert("請輸入完整生日");

    pendingResult = { 
        card: CARDS[Math.floor(Math.random() * CARDS.length)], 
        orientation: Math.random() > 0.7 ? 1 : 0 
    };

    document.getElementById("formCard").style.display = "none";
    document.getElementById("deckSection").classList.add("show");
    buildDeck();
  });

  // 2. 建立牌堆
  function buildDeck() {
    const fan = document.getElementById("deckFan");
    fan.innerHTML = "";
    const fanWidth = fan.clientWidth;
    const cardWidth = Math.max(80, Math.min(110, window.innerWidth * 0.15));
    const totalTravel = fanWidth * 0.9;
    const step = (totalTravel - cardWidth) / (DECK_COUNT - 1);

    for (let i = 0; i < DECK_COUNT; i++) {
      const card = document.createElement("div");
      card.className = "deck-card";
      card.style.zIndex = i;
      // 預設計算 X 位移
      const x = (i * step) - (totalTravel / 2) + (cardWidth / 2);
      card.style.setProperty("--fan-x", x + "px");

      const img = document.createElement("img");
      img.src = "_img/card_back.jpg";
      card.appendChild(img);
      
      card.addEventListener("click", (e) => {
        if (isAnimating) return;
        if (deckPhase === "stacked") startShuffle();
        else if (deckPhase === "fanned") pickCard(card);
      });
      fan.appendChild(card);
    }
    deckPhase = "stacked";
  }

  // 3. 洗牌動畫
  function startShuffle() {
    isAnimating = true;
    const cards = document.querySelectorAll(".deck-card");
    const prompt = document.getElementById("deckPrompt");
    
    prompt.textContent = "洗牌中...";
    cards.forEach(c => c.classList.add("shuffling"));

    setTimeout(() => {
      cards.forEach(c => {
        c.classList.remove("shuffling");
        c.classList.add("fanned"); // 這裡觸發 CSS transition 滑開
      });
      deckPhase = "fanned";
      isAnimating = false;
      prompt.textContent = "請感應並選中一張庫洛牌";
    }, 1500);
  }

  // 4. 選牌與結果銜接
  function pickCard(cardEl) {
    isAnimating = true;
    cardEl.classList.add("picking");
    // 直接操作 transform 確保飛出動畫優先
    cardEl.style.transform = `translateX(${cardEl.style.getPropertyValue("--fan-x")}) translateY(-120px) scale(1.2)`;
    
    document.querySelectorAll(".deck-card").forEach(c => { 
        if(c !== cardEl) c.classList.add("fading"); 
    });

    setTimeout(() => {
      document.getElementById("deckSection").style.opacity = "0";
      setTimeout(() => {
        document.getElementById("deckSection").classList.remove("show");
        showFinalResult(pendingResult);
        isAnimating = false;
      }, 500);
    }, 1000);
  }

  // 5. 展示結果
  function showFinalResult({ card, orientation }) {
    const isRev = orientation === 1;
    const flipper = document.getElementById("cardFlipper");
    
    document.getElementById("cardImg").src = card.image_clow;
    document.getElementById("cardNameZh").textContent = "「" + card.name_zh + "」牌";
    document.getElementById("cardMessage").textContent = isRev ? (card.message_reversed || card.message) : card.message;
    
    const tag = document.getElementById("orientationTag");
    tag.textContent = isRev ? "REVERSED · 逆位" : "UPRIGHT · 正位";
    tag.className = "orientation-tag " + (isRev ? "reversed" : "upright");

    document.getElementById("result").classList.add("show");
    
    setTimeout(() => {
      flipper.classList.add("flipped");
      if(isRev) flipper.classList.add("reversed");
      setTimeout(() => document.getElementById("cardInfo").classList.add("show"), 1000);
    }, 500);
  }

  document.getElementById("rerollBtn").addEventListener("click", () => location.reload());

  // 星塵背景
  const starContainer = document.getElementById("stars");
  for (let i = 0; i < 60; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random()*2+1;
    s.style.width = size+"px"; s.style.height = size+"px";
    s.style.left = Math.random()*100+"%"; s.style.top = Math.random()*100+"%";
    s.style.setProperty("--duration", (Math.random()*3+2)+"s");
    s.style.setProperty("--max-opacity", Math.random()*0.7+0.2);
    starContainer.appendChild(s);
  }
</script>
</body>
</html>
