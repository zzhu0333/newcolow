<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>庫洛卡牌・今日運勢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+TC:wght@400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0e0614;
    --gold: #d4a857;
    --gold-light: #f0d287;
    --pink: #f4b8c8;
    --text: #f5e8da;
    --text-dim: #c4a896;
    --pink-deep: #c47189;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: "Noto Serif TC", serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 星塵背景 */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .star {
    position: absolute;
    background: var(--gold-light);
    border-radius: 50%;
    opacity: 0;
    animation: twinkle var(--duration) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--max-opacity); transform: scale(1); }
  }

  main { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; padding: 60px 24px; }

  /* Header */
  .header { text-align: center; margin-bottom: 50px; }
  .crest { font-family: "Cinzel", serif; font-size: 11px; letter-spacing: 6px; color: var(--gold); margin-bottom: 20px; }
  .header h1 {
    font-family: "Shippori Mincho", serif;
    font-size: clamp(28px, 6vw, 40px);
    background: linear-gradient(135deg, var(--gold-light), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 5px;
    margin-bottom: 10px;
  }
  .header .sub { color: var(--text-dim); font-size: 14px; letter-spacing: 3px; }
  .divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 30px auto; }

  /* 表單卡片 */
  .form-card {
    background: rgba(26, 13, 31, 0.4);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(212, 168, 87, 0.15);
    padding: 60px 40px;
    margin: 0 auto;
    max-width: 520px;
    text-align: center;
  }
  .form-card h2 {
    font-family: "Shippori Mincho", serif;
    font-size: 18px;
    color: var(--gold-light);
    margin-bottom: 40px;
    letter-spacing: 6px;
  }

  /* 輸入框對齊修正 */
  .date-inputs { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
  .field { display: flex; flex-direction: column; align-items: center; width: 100px; }
  .field label { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 12px; font-family: "Cinzel", serif; }
  .field input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(212, 168, 87, 0.2);
    padding: 15px 0;
    color: var(--text);
    font-family: "Cinzel", serif;
    font-size: 22px;
    text-align: center;
    border-radius: 0;
    appearance: none;
  }
  .field input::-webkit-inner-spin-button, .field input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

  .submit-btn {
    width: 100%;
    max-width: 300px;
    background: linear-gradient(135deg, var(--gold), var(--pink-deep));
    color: var(--bg-deep);
    border: none;
    padding: 16px;
    font-family: "Shippori Mincho", serif;
    font-size: 15px;
    letter-spacing: 6px;
    cursor: pointer;
  }

  /* 牌堆區域 - 52張整齊排列 */
  .deck-section { display: none; text-align: center; }
  .deck-section.show { display: block; }
  .deck-fan {
    position: relative;
    width: 100%;
    height: 420px;
    margin: 20px auto;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .deck-card {
    position: absolute;
    width: clamp(45px, 8vw, 75px);
    aspect-ratio: 172 / 384;
    border-radius: 4px;
    overflow: hidden;
    background: #2a1438;
    box-shadow: -2px 0 12px rgba(0,0,0,0.5);
    transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s;
    cursor: pointer;
  }
  .deck-card img { width: 100%; height: 100%; object-fit: cover; }
  .deck-card.shuffling { animation: shuffle-shake 1.8s ease-in-out infinite; }
  @keyframes shuffle-shake {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(-10px, 4px); }
    75% { transform: translate(10px, -4px); }
  }
  .deck-card.fanned { transform: translateX(var(--fan-x)); }
  .deck-card.fanned:hover { transform: translateX(var(--fan-x)) translateY(-40px); z-index: 1000 !important; }
  .deck-card.fading { opacity: 0; pointer-events: none; }

  /* 完整的卡牌結果區 */
  .result { display: none; text-align: center; max-width: 600px; margin: 0 auto; }
  .result.show { display: block; animation: fade-in 1s forwards; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  .card-stage { display: flex; justify-content: center; margin: 30px 0; perspective: 1000px; }
  .card-flipper { width: 220px; aspect-ratio: 172/384; transform-style: preserve-3d; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
  .card-flipper.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
  .card-front { transform: rotateY(180deg); }
  .card-face img { width: 100%; height: 100%; object-fit: cover; }

  /* 資訊展示區 */
  .card-info { opacity: 0; transform: translateY(20px); transition: 0.8s ease 1s; }
  .card-info.show { opacity: 1; transform: translateY(0); }
  .card-name { color: var(--pink); font-size: 28px; letter-spacing: 6px; margin-bottom: 10px; font-family: "Shippori Mincho", serif; }
  .card-keywords { color: var(--gold-light); font-size: 14px; letter-spacing: 3px; margin-bottom: 25px; font-family: "Cinzel", serif; }
  .card-desc { color: var(--text); line-height: 1.8; font-size: 16px; margin-bottom: 40px; text-align: justify; padding: 0 20px; }

  .reroll-btn {
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 12px 40px;
    cursor: pointer;
    font-family: 'Shippori Mincho', serif;
    letter-spacing: 2px;
    transition: 0.3s;
  }
  .reroll-btn:hover { background: var(--gold); color: var(--bg-deep); }

  @media (max-width: 600px) {
    .date-inputs { gap: 10px; }
    .field { width: 85px; }
    .field input { font-size: 18px; }
    .deck-card { width: 45px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<main>
  <header class="header">
    <div class="crest">✦ DAILY CLOW READING ✦</div>
    <h1>庫洛卡牌・今日運勢</h1>
    <div class="sub">迎接今日的庫洛訊息</div>
    <div class="divider"></div>
  </header>

  <section class="form-card" id="formCard">
    <h2>請輸入出生年月日</h2>
    <div class="date-inputs">
      <div class="field"><label>YEAR</label><input type="number" id="year" placeholder="1999" /></div>
      <div class="field"><label>MONTH</label><input type="number" id="month" placeholder="04" /></div>
      <div class="field"><label>DAY</label><input type="number" id="day" placeholder="01" /></div>
    </div>
    <button class="submit-btn" id="submitBtn">召 喚 今 日 之 牌</button>
  </section>

  <section class="deck-section" id="deckSection">
    <div class="deck-fan" id="deckFan"></div>
  </section>

  <section class="result" id="result">
    <div class="card-stage">
      <div class="card-flipper" id="cardFlipper">
        <div class="card-face card-back"><img src="_img/card_back.jpg" /></div>
        <div class="card-face card-front"><img id="cardImg" /></div>
      </div>
    </div>
    
    <div class="card-info" id="cardInfo">
      <h3 class="card-name" id="cardName"></h3>
      <div class="card-keywords" id="cardKeywords"></div>
      <p class="card-desc" id="cardDesc"></p>
      <button onclick="location.reload()" class="reroll-btn">重新召喚</button>
    </div>
  </section>
</main>

<script>
  // 星塵生成
  const container = document.getElementById("stars");
  for (let i = 0; i < 80; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random()*2+1;
    s.style.width = size+"px"; s.style.height = size+"px";
    s.style.left = Math.random()*100+"%"; s.style.top = Math.random()*100+"%";
    s.style.setProperty("--duration", (Math.random()*3+2)+"s");
    s.style.setProperty("--max-opacity", Math.random()*0.7+0.2);
    container.appendChild(s);
  }

  let CARDS = [];
  fetch("cards.json").then(r => r.json()).then(data => { CARDS = data; });

  let deckPhase = "stacked";
  const DECK_COUNT = 52;

  function buildDeck() {
    const fan = document.getElementById("deckFan");
    fan.innerHTML = "";
    const fanWidth = fan.clientWidth;
    const cardWidth = Math.max(45, Math.min(75, window.innerWidth * 0.08));
    const totalTravel = fanWidth * 0.92; 
    const step = (totalTravel - cardWidth) / (DECK_COUNT - 1);

    for (let i = 0; i < DECK_COUNT; i++) {
      const card = document.createElement("div");
      card.className = "deck-card";
      card.style.zIndex = i;
      const x = (i * step) - (totalTravel / 2) + (cardWidth / 2);
      card.style.setProperty("--fan-x", x + "px");

      const img = document.createElement("img");
      img.src = "_img/card_back.jpg";
      card.appendChild(img);
      
      card.addEventListener("click", () => {
        if (deckPhase === "stacked") startShuffle();
        else if (deckPhase === "fanned") pickCard(card);
      });
      fan.appendChild(card);
    }
  }

  function startShuffle() {
    deckPhase = "shuffling";
    const cards = document.querySelectorAll(".deck-card");
    cards.forEach(c => c.classList.add("shuffling"));
    setTimeout(() => {
      cards.forEach(c => {
        c.classList.remove("shuffling");
        c.classList.add("fanned");
      });
      deckPhase = "fanned";
    }, 1800);
  }

  function pickCard(cardEl) {
    deckPhase = "picked";
    cardEl.style.zIndex = "2000";
    cardEl.style.transform = "translateX(var(--fan-x)) translateY(-120px) scale(1.2)";
    
    document.querySelectorAll(".deck-card").forEach(c => {
      if(c !== cardEl) c.classList.add("fading");
    });

    setTimeout(() => {
      document.getElementById("deckSection").style.display = "none";
      const card = CARDS[Math.floor(Math.random() * CARDS.length)];
      
      // 填充完整卡牌資訊
      document.getElementById("cardImg").src = card.image_clow;
      document.getElementById("cardName").textContent = `「 ${card.name_zh} 」`;
      document.getElementById("cardKeywords").textContent = card.keywords ? card.keywords.join(" • ") : "";
      document.getElementById("cardDesc").textContent = card.desc_fortune || "今日你的運勢如星辰般閃耀，請保持初心，勇敢前行。";
      
      document.getElementById("result").classList.add("show");
      
      // 動畫序列
      setTimeout(() => {
        document.getElementById("cardFlipper").classList.add("flipped");
        setTimeout(() => {
          document.getElementById("cardInfo").classList.add("show");
        }, 1000);
      }, 400);
    }, 800);
  }

  document.getElementById("submitBtn").addEventListener("click", () => {
    document.getElementById("formCard").style.display = "none";
    document.getElementById("deckSection").classList.add("show");
    buildDeck();
  });
</script>
</body>
</html>
